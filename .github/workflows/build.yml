name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - "*"
  release:
    types: [created]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so auto package version numbers work as expected

      - name: Test
        run: dotnet test

      - name: Package
        run: dotnet pack -o .

      - uses: actions/upload-artifact@v4
        with:
          name: "packages"
          path: |
            ./*.nupkg
          retention-days: 1
